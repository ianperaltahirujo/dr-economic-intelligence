name: DR Economic Intelligence Pipeline

on:
  schedule:
    # Every Monday at 13:00 UTC (9:00 AM Santo Domingo time)
    - cron: '0 13 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      skip_download:
        description: 'Skip BCRD file download (use cached)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          SB_API_KEY:     ${{ secrets.SB_API_KEY }}
          BCRD_API_KEY:   ${{ secrets.BCRD_API_KEY }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          EMAIL_RECIPIENTS:    ${{ secrets.EMAIL_RECIPIENTS }}
          ONEDRIVE_OWNER_UPN:   "work@lasociedad.com.do"
          ONEDRIVE_FOLDER_PATH: "Economic Intelligence/Output"
          EMAIL_SENDER_UPN:     "work@lasociedad.com.do"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          if [ "${{ github.event.inputs.skip_download }}" = "true" ]; then
            python run_pipeline.py --skip-download
          else
            python run_pipeline.py
          fi

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if [ -f data/state/current_month_snapshots.json ]; then
            git add data/state/current_month_snapshots.json
          fi
          if [ -f data/state/monthly_reports_state.json ]; then
            git add data/state/monthly_reports_state.json
          fi
          git diff --staged --quiet || git commit -m "chore: weekly dashboard update [skip ci]"
          git push

      - name: Upload Excel workbook as artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: vulnerability-report-${{ github.run_id }}
          path: data/output/vulnerability_report.xlsx
          retention-days: 90